<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update User</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-lg w-96">

    <h2 class="text-2xl font-bold text-center mb-6 text-green-600">Update User</h2>

    <form th:action="@{/update/{id}(id=${user.id})}" th:object="${user}" method="post" class="space-y-4">

        <input type="text" th:field="*{name}" required
               class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-400">

        <input type="email" th:field="*{email}" required
               class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-green-400">

        <button type="submit"
                class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700">
            Update
        </button>

    </form>

</div>

</body>
</html>
